    - name: devto-postman
      url: "https://dev.to/feed/tag/postman"
      label: "devto"
      max_items: 6
    - name: devto-selenium
      url: "https://dev.to/feed/tag/selenium"
      label: "devto"
      max_items: 6

    # ---------- Blog chuyên QA / testing ----------
    - name: postman-blog
      url: "https://blog.postman.com/feed/"
