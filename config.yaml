      label: "devto"
      max_items: 8
    - name: devto-qa
      url: "https://dev.to/feed/tag/qa"
      label: "devto"
      max_items: 8
    - name: devto-automation
      url: "https://dev.to/feed/tag/automation"
      label: "devto"
