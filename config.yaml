# =========================================
# AI Deal Bot - Configuration
# =========================================

schedule:
  reddit_interval_minutes: 15
  feeds_interval_minutes: 20
  twitter_interval_minutes: 30
  batch_send_delay_seconds: 2  # delay giữa các message Telegram để tránh rate limit
  max_send_per_cycle: 5        # tối đa N tin mỗi cycle, tránh spam
  max_per_source_per_cycle: 2  # tránh 1 nguồn chiếm hết batch
  max_per_topic_per_cycle: 1   # tránh nhiều tin cùng một chủ đề/model
  quiet_hours_start: 23        # không gửi từ 23h...
  quiet_hours_end: 7           # ...đến 7h sáng (trừ tin score >= quiet_min_score)
  quiet_min_score: 9           # tin cực hot vẫn gửi dù đang quiet hours
  timezone: "Asia/Ho_Chi_Minh" # giờ VN cho quiet hours (Railway chạy UTC)

ai_filter:
  enabled: true
  base_url: "https://token-plan-sgp.xiaomimimo.com/v1"
  model: "mimo-v2.5"
  min_score_to_notify: 6  # chỉ gửi item có score >= 6
  timeout_seconds: 30

posting:
  enabled: true
  blog_dir: "E:/blog/frontend/content/blog"
  default_hours: 24
  default_limit: 5
  min_score: 8
  min_items: 2
  timeout_seconds: 60
  include_drafted: false
  mark_drafted_on_create: true

reddit:
  # Lượng post lấy mỗi lần poll mỗi sub
  posts_per_sub: 15
  # Chỉ lấy post mới trong vòng N giờ
  max_age_hours: 6
  # Delay giữa các sub để tránh 429 (tăng lên 2-3 nếu bị rate limit)
  request_delay_seconds: 1.5
  subreddits:
    - ChatGPT
    - LocalLLaMA
    - MachineLearning
    - singularity
    - ClaudeAI
    - OpenAI
    - artificial

twitter:
  enabled: false  # Cloudflare chặn IP VN, bật lại khi dùng VPN/proxy
  tweets_per_account: 10
  max_age_hours: 6
  accounts:
    - AnthropicAI
    - OpenAI
    - GoogleDeepMind
    - GoogleAI
    - rowancheung
    - minchoi
    - emollick
    - sama
    - AndrewYNg

feeds:
  max_age_hours: 12
  request_delay_seconds: 1.0
  sources:
    - name: hackernews
      url: "https://hnrss.org/newest?points=100"
      label: "hn"
      max_items: 15
    - name: hn-claude
      url: "https://hnrss.org/newest?q=Claude"
      label: "hn"
      max_items: 10
    - name: hn-anthropic
      url: "https://hnrss.org/newest?q=Anthropic"
      label: "hn"
      max_items: 10
    - name: devto-ai
      url: "https://dev.to/feed/tag/ai"
      label: "devto"
      max_items: 6
    - name: devto-llm
      url: "https://dev.to/feed/tag/llm"
      label: "devto"
      max_items: 6
    - name: devto-claude
      url: "https://dev.to/feed/tag/claude"
      label: "devto"
      max_items: 8
    - name: devto-anthropic
      url: "https://dev.to/feed/tag/anthropic"
      label: "devto"
      max_items: 8
    - name: anthropic-news
      url: "https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_news.xml"
      label: "anthropic"
      max_items: 10
    - name: claude-code-releases
      url: "https://github.com/anthropics/claude-code/releases.atom"
      label: "github"
      max_items: 10
    - name: claude-code-commits
      url: "https://github.com/anthropics/claude-code/commits/main.atom"
      label: "github"
      max_items: 6
    - name: producthunt
      url: "https://www.producthunt.com/feed"
      label: "ph"
      max_items: 10
    - name: github-trending
      url: "https://mshibanami.github.io/GitHubTrendingRSS/daily/all.xml"
      label: "github"
      max_items: 12
    - name: huggingface
      url: "https://huggingface.co/blog/feed.xml"
      label: "hf"
      max_items: 10
    - name: lobsters
      url: "https://lobste.rs/rss"
      label: "lobsters"
      max_items: 10
    - name: simonwillison
      url: "https://simonwillison.net/atom/everything/"
      label: "simon"
      max_items: 10

