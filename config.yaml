# =========================================
# AI Deal Bot - Configuration
# =========================================

schedule:
  reddit_interval_minutes: 15
  feeds_interval_minutes: 20
  twitter_interval_minutes: 30
  batch_send_delay_seconds: 2  # delay giữa các message Telegram để tránh rate limit
  max_send_per_cycle: 5        # tối đa N tin mỗi cycle, tránh spam
  max_per_source_per_cycle: 2  # tránh 1 nguồn chiếm hết batch
  max_per_topic_per_cycle: 1   # tránh nhiều tin cùng một chủ đề/model
  quiet_hours_start: 23        # không gửi từ 23h...
  quiet_hours_end: 7           # ...đến 7h sáng (trừ tin score >= quiet_min_score)
  quiet_min_score: 9           # tin cực hot vẫn gửi dù đang quiet hours
  timezone: "Asia/Ho_Chi_Minh" # giờ VN cho quiet hours (Railway chạy UTC)

ai_filter:
  enabled: true
  base_url: "https://token-plan-sgp.xiaomimimo.com/v1"
  model: "mimo-v2.5"
  min_score_to_notify: 6  # chỉ gửi item có score >= 6
  timeout_seconds: 30

posting:
  enabled: false  # tester branch: chỉ bắn tin Telegram, KHÔNG tạo bài blog
  blog_dir: "E:/blog/frontend/content/blog"
  default_hours: 24
  default_limit: 5
  min_score: 8
  min_items: 2
  timeout_seconds: 60
  include_drafted: false
  mark_drafted_on_create: true

reddit:
  # Lượng post lấy mỗi lần poll mỗi sub
  posts_per_sub: 15
  # Chỉ lấy post mới trong vòng N giờ
  max_age_hours: 8
  # Delay giữa các sub để tránh 429 (tăng lên 2-3 nếu bị rate limit)
  request_delay_seconds: 1.5
  subreddits:
    - QualityAssurance      # QA tổng hợp
    - softwaretesting       # software testing
    - selenium              # Selenium automation
    - QAJobs                # tin tuyển + thảo luận nghề QA
    - SQL                   # SQL chung
    - learnSQL              # học SQL
    - PostgreSQL            # Postgres
    - Database              # database tổng hợp
    - webdev                # context dev cho tester web

twitter:
  enabled: false  # Cloudflare chặn IP VN, bật lại khi dùng VPN/proxy
  tweets_per_account: 10
  max_age_hours: 6
  accounts:
    - AnthropicAI
    - OpenAI
    - GoogleDeepMind
    - GoogleAI
    - rowancheung
    - minchoi
    - emollick
    - sama
    - AndrewYNg

feeds:
  max_age_hours: 24
  request_delay_seconds: 1.0
  sources:
    # ---------- Hacker News (query theo chủ đề) ----------
    - name: hn-testing
      url: "https://hnrss.org/newest?q=software+testing"
      label: "hn"
      max_items: 8
    - name: hn-postman
      url: "https://hnrss.org/newest?q=Postman+API"
      label: "hn"
      max_items: 6
    - name: hn-sql
      url: "https://hnrss.org/newest?q=SQL"
      label: "hn"
      max_items: 8
    - name: hn-test-automation
      url: "https://hnrss.org/newest?q=test+automation"
      label: "hn"
      max_items: 6

    # ---------- Dev.to (theo tag) ----------
    - name: devto-testing
